apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: backend-servicemonitor
  namespace: monitoring
  labels:
    release: monitoring-stack

spec:
  selector:
    matchLabels:
      app: backend

  namespaceSelector:
    matchNames:
      - todo-app

  endpoints:
    - port: http
      path: /metrics
      interval: 15s