apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: backend-hpa
  namespace: todo-app

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend

  minReplicas: 1
  maxReplicas: 5

  behavior:

    scaleUp:
      stabilizationWindowSeconds: 60

      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

    scaleDown:
      stabilizationWindowSeconds: 120

      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

  metrics:

  - type: Resource

    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 50